# Claude Code Configuration - Common
# Settings applied to all profiles

# Global settings (keys must match .claude.json keys exactly)
global:
  autoUpdates: true
  theme: dark-daltonized
# Settings (keys must match .claude/settings.json keys exactly)
settings:
  alwaysThinkingEnabled: true
  includeCoAuthoredBy: false
  outputStyle: Explanatory
  enabledPlugins:
    swift-lsp@claude-plugins-official: true
    typescript-lsp@claude-plugins-official: true
    rust-analyzer-lsp@claude-plugins-official: true
    opencode@kud: true
  statusLine:
    type: command
    command: |
      input=$(cat); trunc_mid() { local s="$1"; local max="$2"; if (( ${#s} > max )); then local head=$(( (max - 3) / 2 )); local tail=$(( max - 3 - head )); printf '%s...%s' "${s:0:head}" "${s: -tail}"; else printf '%s' "$s"; fi; }; cwd=$(echo "$input" | jq -r '.workspace.current_dir'); cd "$cwd" 2>/dev/null || exit 0; raw_path="${cwd/#$HOME/}"; raw_path=$(trunc_mid "$raw_path" 40); parent_dir=$(dirname "$raw_path"); last_dir=$(basename "$raw_path"); if [[ "$parent_dir" == "." ]]; then dir_display=$(printf '\033[38;2;0;146;186m%s\033[0m' "$last_dir"); else dir_display=$(printf '\033[38;2;255;1;116m%s/\033[38;2;0;146;186m%s\033[0m' "$parent_dir" "$last_dir"); fi; git_branch=""; if git rev-parse --git-dir > /dev/null 2>&1; then branch=$(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --short HEAD 2>/dev/null); if [[ -n "$branch" ]]; then branch=$(trunc_mid "$branch" 32); git_branch=$(printf ' \033[38;2;128;212;64m⎇ %s\033[0m' "$branch"); fi; fi; model=$(echo "$input" | jq -r 'if (.model|type)=="object" then (.model.display_name // .model.name // .model.id // empty) else (.model // empty) end'); model_display=$(printf ' \033[38;2;182;216;138m[%s]\033[0m' "${model:-?}"); printf '%s%s%s' "${dir_display}" "${git_branch}" "${model_display}"
  hooks:
    PostToolUse:
      - matcher: "Write|Edit"
        hooks:
          - type: command
            command: "jq -r '.tool_input.file_path // .tool_input.path // empty' | xargs -I{} prettier --write {} 2>/dev/null || true"
  permissions:
    allow:
      - Bash(npm run test *)
      # Git read/inspect operations - auto-accept
      - Bash(git -C * rev-parse *)
      - Bash(git -C * status *)
      - Bash(git -C * log *)
      - Bash(git rev-parse *)
      - Bash(git status *)
      - Bash(git log *)
      - Bash(git diff *)
      # Regular git push - auto-accept
      - Bash(git push)
      - Bash(git push origin *)
      - Bash(git push -u *)
      - Bash(git push --set-upstream *)
      # Notion operations - auto-accept
      - mcp__notion__notion-fetch
      - mcp__notion__notion-search
      - mcp__notion__notion-get-comments
      - mcp__notion__notion-get-users
      - mcp__notion__notion-get-teams
      - mcp__notion__notion-create-pages
      - mcp__notion__notion-update-page
      - mcp__notion__notion-create-comment
      - mcp__notion__notion-create-view
      - mcp__notion__notion-update-view
      - mcp__notion__notion-update-data-source
      - mcp__notion__notion-duplicate-page
      - mcp__notion__notion-move-pages
      # Todoist read operations - auto-accept
      - mcp__todoist__find-tasks
      - mcp__todoist__find-tasks-by-date
      - mcp__todoist__find-projects
      - mcp__todoist__find-sections
      - mcp__todoist__find-comments
      - mcp__todoist__find-completed-tasks
      - mcp__todoist__find-labels
      - mcp__todoist__find-project-collaborators
      - mcp__todoist__find-activity
      - mcp__todoist__fetch
      - mcp__todoist__fetch-object
      - mcp__todoist__get-overview
      - mcp__todoist__list-workspaces
      - mcp__todoist__search
      - mcp__todoist__user-info
      # Google Calendar read operations - auto-accept
      - mcp__claude_ai_Google_Calendar__gcal_list_events
      - mcp__claude_ai_Google_Calendar__gcal_list_calendars
      - mcp__claude_ai_Google_Calendar__gcal_get_event
      - mcp__claude_ai_Google_Calendar__gcal_find_meeting_times
      - mcp__claude_ai_Google_Calendar__gcal_find_my_free_time
      # Excalidraw read operations - auto-accept
      - mcp__excalidraw__read_checkpoint
      - mcp__excalidraw__read_me
      - mcp__excalidraw__create_view
      # Google Keep read operations - auto-accept
      - mcp__google-keep__list_notes
      - mcp__google-keep__get_note
      - mcp__google-keep__list_labels
      # GitHub CLI read operations - auto-accept
      - Bash(gh pr list*)
      - Bash(gh pr view*)
      - Bash(gh pr diff*)
      - Bash(gh pr checks*)
      - Bash(gh pr status*)
      - Bash(gh issue list*)
      - Bash(gh issue view*)
      - Bash(gh issue status*)
      - Bash(gh repo view*)
      - Bash(gh repo list*)
      - Bash(gh search *)
      - Bash(gh api *)
      # GitHub CLI write operations - auto-accept
      - Bash(gh pr ready*)
      - Bash(gh pr merge*)
      - Bash(gh pr create*)
      # File search - auto-accept
      - Bash(find *)
      # GitHub MCP read operations - auto-accept
      # (prefer gh CLI for triage; MCP kept for write/review operations)
      - mcp__github__issue_read
      - mcp__github__pull_request_read
      - mcp__github__get_file_contents
      - mcp__github__get_commit
      - mcp__github__pull_request_review_write
      - mcp__github__add_issue_comment
      - mcp__github__add_reply_to_pull_request_comment
      # Atlassian / Jira - auto-accept
      - mcp__atlassian__atlassianUserInfo
      - mcp__atlassian__getAccessibleAtlassianResources
      - mcp__atlassian__getVisibleJiraProjects
      - mcp__atlassian__getJiraIssue
      - mcp__atlassian__searchJiraIssuesUsingJql
      - mcp__atlassian__searchAtlassian
      - mcp__atlassian__lookupJiraAccountId
      - mcp__atlassian__getJiraIssueTypeMetaWithFields
      - mcp__atlassian__getJiraProjectIssueTypesMetadata
      - mcp__atlassian__getTransitionsForJiraIssue
      - mcp__atlassian__getIssueLinkTypes
      - mcp__atlassian__getJiraIssueRemoteIssueLinks
      - mcp__atlassian__createJiraIssue
      - mcp__atlassian__editJiraIssue
      - mcp__atlassian__transitionJiraIssue
      - mcp__atlassian__addCommentToJiraIssue
      - mcp__atlassian__addWorklogToJiraIssue
      - mcp__atlassian__createIssueLink
      - mcp__atlassian__fetchAtlassian
      # Slack - auto-accept
      - Bash(slack-send *)
      # my ai toolchain - auto-accept
      - Bash(my ai *)
    ask:
      - Bash(npm publish *)
      # Force push - requires confirmation
      - Bash(git push --force*)
      - Bash(git push -f*)
      - Bash(git push *--force*)
      - Bash(git push *-f*)
    deny:
      - Read(.env*)
      - Skill(update-config)
      - Bash(rm -rf *)

# Plugin marketplaces
marketplaces:
  kud:
    source: kud/claude-plugins

# Common MCP servers (all profiles)
mcp:
  github:
    transport: http
    url: https://api.githubcopilot.com/mcp
    headers:
      Authorization: Bearer ${MCP_GITHUB_TOKEN}
  notion:
    transport: http
    url: https://mcp.notion.com/mcp
  todoist:
    transport: http
    url: https://ai.todoist.net/mcp
  excalidraw:
    transport: http
    url: https://mcp.excalidraw.com/mcp
  google-keep:
    transport: stdio
    command: uvx
    args:
      - --from
      - git+https://github.com/kud/mcp-google-keep
      - mcp-google-keep
  playwright:
    transport: stdio
    command: npx
    args:
      - -y
      - "@playwright/mcp@latest"
      - --headless
