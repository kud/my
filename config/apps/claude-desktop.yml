# Claude Desktop Configuration - Common
# MCP servers for Claude Desktop app (macOS: ~/Library/Application Support/Claude/claude_desktop_config.json)
#
# This YAML config maps directly to the JSON format:
# mcp:
#   server-name:
#     transport: stdio
#     command: <command>
#     args:
#       - <arg1>
#       - <arg2>
#     env:  # optional, only include if you need environment variables
#       KEY: value

mcp:
  Google Keep:
    transport: stdio
    command: ${HOME}/.local/share/mise/shims/uvx
    args:
      - --from
      - git+https://github.com/kud/mcp-google-keep
      - mcp-google-keep
  # Raindrop: (pro only)
  #   transport: stdio
  #   command: npx
  #   args:
  #     - -y
  #     - mcp-remote
  #     - https://api.raindrop.io/rest/v2/ai/mcp
  Raindrop:
    transport: stdio
    command: npx
    args:
      - --yes
      - "@kud/mcp-raindrop-io@latest"
    env:
      RAINDROP_TOKEN: ${MCP_RAINDROPIO_TOKEN}
  Playwright:
    transport: stdio
    command: npx
    args:
      - -y
      - "@playwright/mcp@latest"
  Trakt:
    transport: stdio
    command: npx
    args:
      - --yes
      - "@kud/mcp-trakt@latest"
  # basic-memory:
  #   transport: stdio
  #   command: ${HOME}/.local/share/mise/shims/uvx
  #   args:
  #     - basic-memory
  #     - mcp
