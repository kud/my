# Increase timeout to prevent Node resolution warnings
command_timeout = 1500
scan_timeout = 30
palette = "my"

# Global format
format = """
$cmd_duration$line_break\
$directory\
$git_branch\
$git_status\
$git_state\
$package\
$nodejs\
$python\
$rust\
$golang\
$java\
$line_break\
$jobs\
$character"""

# Pure theme signature: newline before prompt for breathing room
add_newline = true

# Directory
[directory]
style = "#ff0174"
truncation_length = 4
truncate_to_repo = false
truncation_symbol = "ÔÇĞ/"
fish_style_pwd_dir_length = 1
repo_root_style = "bold #0092ba"
home_symbol = "´Çò"
read_only = " ¾░î¥"
read_only_style = "#d70000"
format = "[$path]($style) "

# Optional pure basename alternative (disabled in main format for now)
[custom.basename]
command = 'basename "$PWD"'
when = 'true'
format = '[($output)](31) '


# Git branch
[git_branch]
style = "#80d440"
format = "[´Éİ $branch]($style)"
truncation_length = 32
truncation_symbol = "ÔÇĞ"

# Git status
[git_status]
style = "#808080"
conflicted = "="
ahead = "Ôçí"
behind = "Ôçú"
diverged = "Ôçò"
up_to_date = ""
untracked = "?$count"
modified = "*$count"
staged = "+$count"
renamed = "┬╗$count"
deleted = "Ô£İ$count"
format = '([$staged$modified$untracked$ahead_behind]($style))'

# Git state
[git_state]
style = "bold #ff5f87"
format = '[\($state( $progress_current of $progress_total)\)]($style) '

# Character
[character]
success_symbol = "[ÔØ»](#86ef95)"
error_symbol = "[ÔØ»](red)"
vicmd_symbol = "[ÔØ«](#ffaf00)"
format = "$symbol "

# Command duration
[cmd_duration]
min_time = 1_500
style = "yellow"
format = "[ÔÅ▒ $duration]($style) "
show_milliseconds = false

# Background jobs
[jobs]
style = "bold blue"
symbol = "Ô£Ğ"
format = "[$symbol$number]($style) "
threshold = 1

# Package version
[package]
style = "bright-black"
symbol = "¾░Åù "
format = " [$symbol$version]($style)"
disabled = false

# Language versions
[nodejs]
style = "green"
symbol = "¯£İ "
format = " [$symbol$version]($style)"
detect_extensions = ["js", "mjs", "cjs", "ts", "tsx", "vue"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
disabled = true
style = "blue"
symbol = "¯êÁ "
format = " [$symbol$version]($style)"
detect_extensions = ["py"]
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile", ".python-version"]

[rust]
disabled = true
style = "red"
symbol = "¾▒İù "
format = " [$symbol$version]($style)"

[golang]
disabled = true
style = "cyan"
symbol = "¯İğ "
format = " [$symbol$version]($style)"

[java]
disabled = true
style = "red"
symbol = "¯ëû "
format = " [$symbol$version]($style)"

# Status
[status]
style = "bold red"
format = '[\[$symbol$status\]]($style) '
disabled = false

# Line break
[line_break]
disabled = false

[username]
disabled = true

[hostname]
ssh_symbol = "¯¼ü "
disabled = true

[aws]
symbol = "¯î¢  "
disabled = true

[gcloud]

disabled = true

[kubernetes]
disabled = true

[docker_context]
symbol = "´îê "
disabled = true

[terraform]
disabled = true

[vagrant]
disabled = true

[nix_shell]
symbol = "´îô "
disabled = true

[conda]
symbol = "´äî "
disabled = true

[memory_usage]
symbol = "¾░ıø "
disabled = true

[time]
disabled = true

# Right prompt
right_format = "$cmd_duration$jobs"

[env_var.profile]
variable = "MY_PROFILE"
format = "[$env_value](244) "


